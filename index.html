<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

    <div id="page-head">
        <h1>Wordle</h1>
    </div>
    <div id="header-break-line"></div>

    <div id="wrapper">

        <div id="game">

            <!-- row 1 -->

            <div id="row1" class="row">
                <div id="box1-1" class="letterbox"></div>
                <div id="box1-2" class="letterbox"></div>
                <div id="box1-3" class="letterbox"></div>
                <div id="box1-4" class="letterbox"></div>
                <div id="box1-5" class="letterbox"></div>
            </div>

            <!-- row 2 -->

            <div id="row2" class="row">
                <div id="box2-1" class="letterbox"></div>
                <div id="box2-2" class="letterbox"></div>
                <div id="box2-3" class="letterbox"></div>
                <div id="box2-4" class="letterbox"></div>
                <div id="box2-5" class="letterbox"></div>
            </div>            

            <!-- row 3 -->

           <div id="row3" class="row">
                <div id="box3-1" class="letterbox"></div>
                <div id="box3-2" class="letterbox"></div>
                <div id="box3-3" class="letterbox"></div>
                <div id="box3-4" class="letterbox"></div>
                <div id="box3-5" class="letterbox"></div>
            </div>    
            
            <!-- row 4 -->

           <div id="row4" class="row">
                <div id="box4-1" class="letterbox"></div>
                <div id="box4-2" class="letterbox"></div>
                <div id="box4-3" class="letterbox"></div>
                <div id="box4-4" class="letterbox"></div>
                <div id="box4-5" class="letterbox"></div>
            </div>  

            <!-- row 5 -->

           <div id="row5" class="row">
                <div id="box5-1" class="letterbox"></div>
                <div id="box5-2" class="letterbox"></div>
                <div id="box5-3" class="letterbox"></div>
                <div id="box5-4" class="letterbox"></div>
                <div id="box5-5" class="letterbox"></div>
            </div>   
            
            <!-- row 6 -->

           <div id="row6" class="row">
                <div id="box6-1" class="letterbox"></div>
                <div id="box6-2" class="letterbox"></div>
                <div id="box6-3" class="letterbox"></div>
                <div id="box6-4" class="letterbox"></div>
                <div id="box6-5" class="letterbox"></div>
            </div>  

            <div id="keys">
                
                <div class="key-row">
                    <button type="button" id="letter-q" class="keyboard key-button">Q</button>
                    <button type="button" id="letter-w" class="keyboard key-button">W</button>
                    <button type="button" id="letter-e" class="keyboard key-button">E</button>
                    <button type="button" id="letter-r" class="keyboard key-button">R</button>
                    <button type="button" id="letter-t" class="keyboard key-button">T</button>
                    <button type="button" id="letter-y" class="keyboard key-button">Y</button>
                    <button type="button" id="letter-u" class="keyboard key-button">U</button>
                    <button type="button" id="letter-i" class="keyboard key-button">I</button>
                    <button type="button" id="letter-o" class="keyboard key-button">O</button>
                    <button type="button" id="letter-p" class="keyboard key-button">P</button>
                </div>

                <div class="key-row">

                    <button type="button" id="letter-a" class="keyboard key-button">A</button>
                    <button type="button" id="letter-s" class="keyboard key-button">S</button>
                    <button type="button" id="letter-d" class="keyboard key-button">D</button>
                    <button type="button" id="letter-f" class="keyboard key-button">F</button>
                    <button type="button" id="letter-g" class="keyboard key-button">G</button>
                    <button type="button" id="letter-h" class="keyboard key-button">H</button>
                    <button type="button" id="letter-j" class="keyboard key-button">J</button>
                    <button type="button" id="letter-k" class="keyboard key-button">K</button>
                    <button type="button" id="letter-l" class="keyboard key-button">L</button>

                </div>

                <div class="key-row">
                    <button type="button" id="enter-button" class="side-key key-button">Enter</button>
                    <button type="button" id="letter-a" class="keyboard key-button">Z</button>
                    <button type="button" id="letter-s" class="keyboard key-button">X</button>
                    <button type="button" id="letter-d" class="keyboard key-button">C</button>
                    <button type="button" id="letter-f" class="keyboard key-button">V</button>
                    <button type="button" id="letter-g" class="keyboard key-button">B</button>
                    <button type="button" id="letter-h" class="keyboard key-button">N</button>
                    <button type="button" id="letter-j" class="keyboard key-button">M</button>
                    <button type="button" id="delete-button" class="side-key key-button">Delete</button>





                </div>



            </div>

        </div>

    </div>




    
</body>
</html>
